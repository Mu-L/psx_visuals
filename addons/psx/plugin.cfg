[plugin]

name="PSX Visuals"
description="This addon contains a set of shaders and materials you can use to make your game look like it was built on the original PlayStation 1 hardware. Almost all of the limitations of the console have been faithfully implemented into a versatile set of shaders.

Quickstart

1. Add the contents of this package to your project, into the folder res://addons/psx/
2. In project Settings, enable the associated Plugin
3. Restart the editor

For more information, visit https://github.com/snotbane/psx_visuals
"
author="snotbane"
version="1.5.0"
script="scripts/Psx.gd"
