[plugin]

name="PSX Visuals"
description="This plugin contains a few shaders and scripts that will make geometry look like it comes straight from the PlayStation 1! All of these following PSX quirks have been faithfully implemented, and can be modified (via shader globals) to suit your needs. See list below for a full list of features.

To get started:

1. Enable the Plugin in Project Settings
2. Restart editor. There may be a few error messages the first time.
3. Check out the README for a comprehensive list of features and how to use them.
"
author="snotbane"
version="1.4"
script="scripts/Psx.gd"
